name: Flat File Load

# Loads flat-file sources from REGISTRY (massey ratings, nflverse draft/combine,
# SBR historical lines, availability reports). Uses hash-skip ledger (meta.flat_file_loads)
# to avoid re-processing unchanged files; off-cadence manual runs are essentially free.
#
# Requires repo secrets:
#   SUPABASE_DB_URL   - Supabase SESSION pooler URL (IPv4)
#
# Flat-file freshness verification is handled by scripts/verify_load.py inside the
# existing daily-load workflow; this workflow does not run verify_load.py.

on:
  schedule:
    - cron: "0 11 * * *" # 11:00 UTC, 1 hour after daily-load completes
  workflow_dispatch:
    inputs:
      source:
        description: "Registry source name(s), space-separated; empty = --due"
        required: false
        type: string

concurrency:
  group: flat-file-load
  cancel-in-progress: false # never kill a mid-merge load; a queued run waits

permissions:
  contents: read
  issues: write

env:
  PYTHON_VERSION: "3.11"
  SUPABASE_DB_URL: ${{ secrets.SUPABASE_DB_URL }}

jobs:
  load:
    name: Load flat-file sources
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}
          cache: pip
      - run: pip install -e ".[flatfiles]"
      - name: Set dlt destination credentials
        # dlt requires the postgres:// scheme (see .dlt/secrets.toml.example)
        run: echo "DESTINATION__POSTGRES__CREDENTIALS=$(printf '%s' "$SUPABASE_DB_URL" | sed 's/^postgresql:/postgres:/')" >> "$GITHUB_ENV"
      - name: Load flat-file sources
        run: |
          if [ -n "${{ inputs.source }}" ]; then
            SOURCES="${{ inputs.source }}"
            python scripts/load_flat_files.py $(printf -- '--source %s ' $SOURCES)
          else
            python scripts/load_flat_files.py --due
          fi
      - name: Open or update failure issue
        if: failure()
        uses: actions/github-script@v7
        with:
          script: |
            const title = "Flat-file load failures";
            const runUrl = `${context.serverUrl}/${context.repo.owner}/${context.repo.repo}/actions/runs/${context.runId}`;
            const { data } = await github.rest.issues.listForRepo({
              owner: context.repo.owner,
              repo: context.repo.repo,
              state: "open",
            });
            const existing = data.find((i) => i.title === title);
            const body = `Run failed: ${runUrl} (${new Date().toISOString()})`;
            if (existing) {
              await github.rest.issues.createComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: existing.number,
                body,
              });
            } else {
              await github.rest.issues.create({
                owner: context.repo.owner,
                repo: context.repo.repo,
                title,
                body,
              });
            }
